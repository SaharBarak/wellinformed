<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" fill="none">
  <!-- Background -->
  <rect width="800" height="220" rx="16" fill="#0f0f1a"/>

  <!-- Icon: knowledge graph - rounded square with connected nodes -->
  <g transform="translate(40, 30)">
    <!-- Rounded container -->
    <rect x="0" y="0" width="160" height="160" rx="32" fill="#1a1a2e" stroke="#2a2a4e" stroke-width="2"/>

    <!-- Edges (connections) -->
    <line x1="50" y1="55" x2="110" y2="45" stroke="#4E79A7" stroke-width="3" opacity="0.7"/>
    <line x1="50" y1="55" x2="80" y2="110" stroke="#4E79A7" stroke-width="3" opacity="0.7"/>
    <line x1="110" y1="45" x2="120" y2="105" stroke="#4E79A7" stroke-width="3" opacity="0.7"/>
    <line x1="80" y1="110" x2="120" y2="105" stroke="#4E79A7" stroke-width="3" opacity="0.7"/>
    <line x1="80" y1="110" x2="50" y2="135" stroke="#76B7B2" stroke-width="2.5" opacity="0.5" stroke-dasharray="5,4"/>
    <line x1="120" y1="105" x2="140" y2="135" stroke="#76B7B2" stroke-width="2.5" opacity="0.5" stroke-dasharray="5,4"/>

    <!-- Nodes -->
    <circle cx="50" cy="55" r="12" fill="#4E79A7"/>
    <circle cx="110" cy="45" r="10" fill="#4E79A7"/>
    <circle cx="80" cy="110" r="14" fill="#59A14F"/>
    <circle cx="120" cy="105" r="9" fill="#59A14F"/>

    <!-- Tunnel nodes (cross-room, different color) -->
    <circle cx="50" cy="135" r="8" fill="#F28E2B" opacity="0.8"/>
    <circle cx="140" cy="135" r="8" fill="#F28E2B" opacity="0.8"/>

    <!-- Pulse rings on the god node -->
    <circle cx="80" cy="110" r="20" fill="none" stroke="#59A14F" stroke-width="1.5" opacity="0.3"/>
    <circle cx="80" cy="110" r="26" fill="none" stroke="#59A14F" stroke-width="1" opacity="0.15"/>
  </g>

  <!-- Text: wellinformed -->
  <text x="230" y="135" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="72" font-weight="800" fill="#e0e0e0" letter-spacing="-2">
    wellinformed
  </text>
</svg>

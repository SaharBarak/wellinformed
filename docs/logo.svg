<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <!-- Neutral dark base — Zinc-950 -->
  <rect width="800" height="200" rx="0" fill="#09090b"/>

  <!-- Graph icon: minimal, single accent (Emerald-500), 4 nodes + 3 edges -->
  <g transform="translate(48, 32)">
    <!-- Edges — thin, emerald at low opacity -->
    <line x1="32" y1="68" x2="88" y2="40" stroke="#10b981" stroke-width="1.5" opacity="0.4"/>
    <line x1="32" y1="68" x2="72" y2="108" stroke="#10b981" stroke-width="1.5" opacity="0.4"/>
    <line x1="88" y1="40" x2="72" y2="108" stroke="#10b981" stroke-width="1.5" opacity="0.4"/>
    <!-- Tunnel edge — dashed, subtler -->
    <line x1="72" y1="108" x2="120" y2="96" stroke="#10b981" stroke-width="1" opacity="0.25" stroke-dasharray="4,3"/>

    <!-- Nodes — solid emerald, varying size = importance -->
    <circle cx="32" cy="68" r="8" fill="#10b981"/>
    <circle cx="88" cy="40" r="6" fill="#10b981"/>
    <circle cx="72" cy="108" r="10" fill="#10b981"/>
    <!-- Tunnel node — outline only -->
    <circle cx="120" cy="96" r="5" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Typography: tracking-tight, clean sans -->
  <text x="200" y="120" font-family="'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="#fafafa" letter-spacing="-3">
    wellinformed
  </text>

  <!-- Subtle tagline -->
  <text x="202" y="152" font-family="'Inter', -apple-system, sans-serif" font-size="14" font-weight="400" fill="#71717a" letter-spacing="0.5">
    persistent research memory for AI agents
  </text>
</svg>
